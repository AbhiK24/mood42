<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mood42 — apt 4F, 2nd ave</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --ink: #080810;
  --warm: #e8c89a;
  --neon-r: #ff4d6d;
  --neon-b: #4d9fff;
  --neon-g: #39ff8a;
  --dim: #404055;
  --paper: #f2efe8;
  --lamp: rgba(232,200,154,0.12);
}

html, body {
  width:100%; height:100%;
  background: var(--ink);
  overflow: hidden;
  font-family: 'Cormorant Garamond', serif;
  cursor: none;
}

/* ── GRAIN ── */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9998;
}

/* ── CANVAS LAYER ── */
#scene {
  position:fixed; inset:0;
  width:100%; height:100%;
}

/* ── HUD: clock + status ── */
#hud {
  position:fixed;
  top:0; left:0; right:0;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:2rem 2.5rem;
  z-index:100;
  pointer-events:none;
}

#clock {
  font-family:'Space Mono',monospace;
  font-size:0.7rem;
  color:rgba(242,239,232,0.25);
  letter-spacing:0.2em;
  line-height:1.8;
}

#clock .time-big {
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:1.8rem;
  font-weight:300;
  color:rgba(242,239,232,0.15);
  display:block;
  letter-spacing:0.05em;
  line-height:1;
  margin-bottom:0.3rem;
}

#status {
  text-align:right;
  font-family:'Space Mono',monospace;
  font-size:0.55rem;
  color:rgba(242,239,232,0.15);
  letter-spacing:0.15em;
  line-height:2;
}

.status-dot {
  display:inline-block;
  width:5px; height:5px;
  border-radius:50%;
  background:var(--neon-g);
  margin-right:6px;
  animation: pulse-dot 2s ease infinite;
  vertical-align:middle;
}

@keyframes pulse-dot {
  0%,100%{opacity:0.3;} 50%{opacity:1;}
}

/* ── SIM TICK FEED ── */
#tick-feed {
  position:fixed;
  bottom:2rem;
  left:2.5rem;
  z-index:100;
  pointer-events:none;
  max-width:320px;
}

.tick-item {
  font-family:'Space Mono',monospace;
  font-size:0.6rem;
  color:rgba(242,239,232,0);
  letter-spacing:0.08em;
  line-height:1.7;
  padding:0.5rem 0;
  border-left:2px solid transparent;
  padding-left:1rem;
  margin-bottom:0.3rem;
  transition: all 0.8s ease;
  transform: translateY(6px);
}

.tick-item.visible {
  color:rgba(242,239,232,0.35);
  transform:translateY(0);
}

.tick-item.event {
  border-left-color: var(--neon-r);
  color:rgba(255,77,109,0.7) !important;
}

.tick-item.dim {
  color:rgba(242,239,232,0.08) !important;
  border-left-color:transparent;
}

/* ── EVENT TOAST ── */
#event-toast {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.96);
  z-index:200;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.8s ease, transform 0.8s ease;
}

#event-toast.show {
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

#event-toast .event-title {
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:300;
  color:rgba(242,239,232,0.9);
  line-height:1.2;
  text-shadow: 0 0 60px rgba(232,200,154,0.3);
}

#event-toast .event-sub {
  font-family:'Space Mono',monospace;
  font-size:0.6rem;
  color:rgba(242,239,232,0.3);
  letter-spacing:0.25em;
  text-transform:uppercase;
  margin-top:0.8rem;
}

/* ── MOOD INDICATOR ── */
#mood-bar {
  position:fixed;
  right:2.5rem;
  top:50%;
  transform:translateY(-50%);
  z-index:100;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.5rem;
  pointer-events:none;
}

#mood-bar .mood-label {
  font-family:'Space Mono',monospace;
  font-size:0.5rem;
  color:rgba(242,239,232,0.12);
  letter-spacing:0.2em;
  text-transform:uppercase;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  transform:rotate(180deg);
  margin-bottom:0.5rem;
}

.mood-pip {
  width:4px; height:4px;
  border-radius:50%;
  background:rgba(242,239,232,0.08);
  transition:all 1s ease;
}

.mood-pip.active { background:var(--warm); box-shadow:0 0 8px var(--warm); }
.mood-pip.low { background:var(--neon-r); box-shadow:0 0 8px rgba(255,77,109,0.5); }
.mood-pip.high { background:var(--neon-g); box-shadow:0 0 8px rgba(57,255,138,0.5); }

/* ── CONTROLS (dev) ── */
#controls {
  position:fixed;
  bottom:2rem;
  right:2.5rem;
  z-index:100;
  display:flex;
  flex-direction:column;
  gap:0.5rem;
  align-items:flex-end;
}

.ctrl-btn {
  font-family:'Space Mono',monospace;
  font-size:0.55rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:rgba(242,239,232,0.2);
  background:none;
  border:1px solid rgba(242,239,232,0.08);
  padding:0.5rem 1rem;
  cursor:pointer;
  transition:all 0.3s ease;
}

.ctrl-btn:hover {
  color:rgba(242,239,232,0.6);
  border-color:rgba(242,239,232,0.2);
  background:rgba(242,239,232,0.03);
}

/* custom cursor */
#cursor {
  position:fixed;
  width:8px; height:8px;
  border-radius:50%;
  background:rgba(242,239,232,0.4);
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.1s ease;
  mix-blend-mode:difference;
}
</style>
</head>
<body>

<canvas id="scene"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="clock">
    <span class="time-big" id="time-display">11:47</span>
    <span id="date-display">tue, march 24</span><br>
    <span id="weather-display">raining · 48°f · nyc</span>
  </div>
  <div id="status">
    <span class="status-dot"></span>WORLD RUNNING<br>
    SIM TICK #<span id="tick-count">0</span><br>
    APT 4F · 2ND AVE<br>
    <span id="mood-text">MOOD: FOCUSED</span>
  </div>
</div>

<!-- TICK FEED -->
<div id="tick-feed">
  <div class="tick-item" id="t0"></div>
  <div class="tick-item" id="t1"></div>
  <div class="tick-item" id="t2"></div>
  <div class="tick-item" id="t3"></div>
  <div class="tick-item" id="t4"></div>
</div>

<!-- EVENT TOAST -->
<div id="event-toast">
  <div class="event-title" id="toast-title"></div>
  <div class="event-sub" id="toast-sub"></div>
</div>

<!-- MOOD BAR -->
<div id="mood-bar">
  <div class="mood-label">mood</div>
</div>

<!-- CONTROLS -->
<div id="controls">
  <button class="ctrl-btn" onclick="triggerEvent()">↯ fire event</button>
  <button class="ctrl-btn" onclick="cycleTime()">◷ cycle time</button>
  <button class="ctrl-btn" onclick="toggleRain()">⌁ rain</button>
</div>

<!-- CURSOR -->
<div id="cursor"></div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

// ── STATE ──
const state = {
  time: 23 * 60 + 47, // minutes since midnight — starts 11:47pm
  raining: true,
  rainIntensity: 0.7,
  neonPhase: 0,
  lampWarm: 1.0,
  characterMood: 'focused', // focused | withdrawn | good | anxious
  sceneObjects: {
    secondCup: false,
    candle: false,
    laptopOpen: true,
    characterOnFloor: false,
    plantWatered: false,
  },
  raindrops: [],
  condensation: [],
  steamParticles: [],
  tickCount: 0,
  oneAmLightOff: false,
  windowReflections: [],
};

// ── RESIZE ──
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── INIT RAINDROPS ──
function initRain() {
  state.raindrops = [];
  for (let i = 0; i < 180; i++) {
    state.raindrops.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      speed: 4 + Math.random() * 8,
      len: 10 + Math.random() * 20,
      opacity: 0.05 + Math.random() * 0.2,
    });
  }
}

// ── INIT CONDENSATION ──
function initCondensation() {
  state.condensation = [];
  for (let i = 0; i < 40; i++) {
    state.condensation.push({
      x: Math.random() * canvas.width * 0.8 + canvas.width * 0.1,
      y: Math.random() * canvas.height * 0.7 + canvas.height * 0.05,
      r: 1 + Math.random() * 3,
      opacity: 0.1 + Math.random() * 0.25,
    });
  }
}

// ── INIT STEAM ──
function initSteam() {
  state.steamParticles = [];
}

function addSteam(x, y) {
  if (state.steamParticles.length < 30) {
    state.steamParticles.push({
      x, y,
      vx: (Math.random() - 0.5) * 0.4,
      vy: -(0.3 + Math.random() * 0.5),
      life: 1.0,
      size: 2 + Math.random() * 3,
    });
  }
}

initRain();
initCondensation();
initSteam();

// ── DRAW FUNCTIONS ──

function drawSky(W, H) {
  // time of day affects sky color
  const nightness = getNightness();
  const skyTop = lerpColor('#040810', '#020408', nightness);
  const skyBot = lerpColor('#0d1f3c', '#060d1a', nightness);

  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.65);
  sky.addColorStop(0, skyTop);
  sky.addColorStop(1, skyBot);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
}

function drawCity(W, H) {
  const buildings = [
    {x:0,    w:60,  h:0.55, lit:[[0.3,0.45],[0.5,0.6],[0.7,0.8]]},
    {x:55,   w:80,  h:0.48, lit:[[0.2,0.35],[0.55,0.65]]},
    {x:130,  w:45,  h:0.52, lit:[[0.4,0.5]]},
    {x:170,  w:100, h:0.40, lit:[[0.25,0.35],[0.5,0.6],[0.7,0.75]]},
    {x:265,  w:60,  h:0.46, lit:[[0.3,0.4]]},
    {x:320,  w:110, h:0.35, lit:[[0.2,0.3],[0.45,0.55],[0.65,0.7]], empire:true},
    {x:430,  w:70,  h:0.44, lit:[[0.35,0.45],[0.6,0.7]]},
    {x:495,  w:85,  h:0.38, lit:[[0.25,0.35],[0.5,0.6]]},
    {x:570,  w:55,  h:0.47, lit:[[0.4,0.5]]},
    {x:620,  w:100, h:0.36, lit:[[0.3,0.4],[0.6,0.7]]},
    {x:710,  w:70,  h:0.50, lit:[]},
    {x:W-60, w:80,  h:0.42, lit:[]},
  ];

  // the "1am light" building
  const oneAmBuilding = {x: W*0.62, w:50, h:0.38, special:true};

  buildings.forEach(b => {
    const bH = H * b.h;
    const bY = H * 0.65 - bH;
    const bX = b.x * (W / 800);
    const bW = b.w * (W / 800);

    // building silhouette
    ctx.fillStyle = '#030810';
    ctx.fillRect(bX, bY, bW, bH + 10);

    if (b.empire) {
      // empire state spire
      ctx.fillStyle = '#020608';
      ctx.fillRect(bX + bW*0.35, bY - H*0.08, bW*0.3, H*0.08);
      ctx.fillRect(bX + bW*0.42, bY - H*0.12, bW*0.16, H*0.04);
      ctx.fillRect(bX + bW*0.46, bY - H*0.15, bW*0.08, H*0.03);
      // antenna blink
      ctx.fillStyle = 'rgba(255,77,109,0.8)';
      ctx.beginPath();
      ctx.arc(bX + bW*0.5, bY - H*0.155, 2, 0, Math.PI*2);
      ctx.fill();
    }

    // lit windows
    b.lit.forEach(([wx, wy]) => {
      const wX = bX + bW * wx;
      const wY = bY + bH * wy;
      const alpha = 0.3 + Math.random() * 0.1;
      ctx.fillStyle = `rgba(255,220,140,${alpha})`;
      ctx.fillRect(wX, wY, 5*(W/800), 6*(W/800));
    });
  });

  // one special building
  const sbX = W * 0.62;
  const sbW = 50 * (W/800);
  const sbH = H * 0.38;
  const sbY = H * 0.65 - sbH;
  ctx.fillStyle = '#030810';
  ctx.fillRect(sbX, sbY, sbW, sbH + 10);

  // THE light — goes off at 1am
  if (!state.oneAmLightOff) {
    ctx.fillStyle = `rgba(255,220,140,0.65)`;
    ctx.fillRect(sbX + sbW*0.4, sbY + sbH*0.35, 6*(W/800), 7*(W/800));
  }

  // water tower
  const wtX = W * 0.44, wtY = H * 0.22;
  ctx.fillStyle = '#020608';
  ctx.fillRect(wtX, wtY, 20*(W/800), 28*(W/800));
  ctx.beginPath();
  ctx.moveTo(wtX - 8*(W/800), wtY);
  ctx.lineTo(wtX + 28*(W/800), wtY);
  ctx.lineTo(wtX + 10*(W/800), wtY - 14*(W/800));
  ctx.closePath();
  ctx.fillStyle = '#020507';
  ctx.fill();
}

function drawNeonReflections(W, H) {
  state.neonPhase += 0.008;
  const flicker = 0.8 + 0.2 * Math.sin(state.neonPhase * 7.3);
  const flicker2 = 0.7 + 0.3 * Math.sin(state.neonPhase * 11.1 + 1.5);

  // red neon from sign outside
  const rGrad = ctx.createRadialGradient(W*0.72, H*0.55, 0, W*0.72, H*0.55, W*0.15);
  rGrad.addColorStop(0, `rgba(255,77,109,${0.08 * flicker})`);
  rGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = rGrad;
  ctx.fillRect(0, 0, W, H);

  // blue neon
  const bGrad = ctx.createRadialGradient(W*0.2, H*0.4, 0, W*0.2, H*0.4, W*0.12);
  bGrad.addColorStop(0, `rgba(77,159,255,${0.06 * flicker2})`);
  bGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = bGrad;
  ctx.fillRect(0, 0, W, H);

  // puddle reflections on street
  if (state.raining) {
    ctx.save();
    ctx.globalAlpha = 0.15 * flicker;
    const pGrad = ctx.createLinearGradient(0, H*0.88, 0, H);
    pGrad.addColorStop(0, 'rgba(255,77,109,0.3)');
    pGrad.addColorStop(0.5, 'rgba(77,159,255,0.2)');
    pGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = pGrad;
    ctx.fillRect(0, H*0.85, W, H*0.15);
    ctx.restore();
  }
}

function drawRoom(W, H) {
  // room floor/walls — warm darkness
  const roomGrad = ctx.createLinearGradient(0, H*0.6, 0, H);
  roomGrad.addColorStop(0, 'rgba(8,6,4,0)');
  roomGrad.addColorStop(0.3, 'rgba(12,9,4,0.85)');
  roomGrad.addColorStop(1, 'rgba(8,6,2,1)');
  ctx.fillStyle = roomGrad;
  ctx.fillRect(0, 0, W, H);

  // side walls darkness
  const lWall = ctx.createLinearGradient(0, 0, W*0.12, 0);
  lWall.addColorStop(0, 'rgba(5,4,2,0.9)');
  lWall.addColorStop(1, 'transparent');
  ctx.fillStyle = lWall;
  ctx.fillRect(0, 0, W*0.12, H);

  const rWall = ctx.createLinearGradient(W*0.88, 0, W, 0);
  rWall.addColorStop(0, 'transparent');
  rWall.addColorStop(1, 'rgba(5,4,2,0.9)');
  ctx.fillStyle = rWall;
  ctx.fillRect(W*0.88, 0, W*0.12, H);
}

function drawLamp(W, H) {
  const lx = W * 0.78, ly = H * 0.45;

  // lamp post
  ctx.strokeStyle = `rgba(232,200,154,${0.3 * state.lampWarm})`;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(lx, H);
  ctx.lineTo(lx, ly + 30);
  ctx.stroke();

  // lamp shade
  ctx.fillStyle = `rgba(232,200,154,${0.25 * state.lampWarm})`;
  ctx.beginPath();
  ctx.ellipse(lx, ly + 28, 20*(W/1200), 8*(W/1200), 0, 0, Math.PI*2);
  ctx.fill();

  // lamp glow
  const lampGlow = ctx.createRadialGradient(lx, ly + 20, 0, lx, ly + 20, W*0.3);
  lampGlow.addColorStop(0, `rgba(232,200,154,${0.18 * state.lampWarm})`);
  lampGlow.addColorStop(0.4, `rgba(232,200,154,${0.05 * state.lampWarm})`);
  lampGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = lampGlow;
  ctx.fillRect(0, 0, W, H);
}

function drawWindowFrame(W, H) {
  // window pane dividers
  ctx.strokeStyle = 'rgba(242,239,232,0.06)';
  ctx.lineWidth = 10;
  ctx.beginPath();
  ctx.moveTo(W/2, 0);
  ctx.lineTo(W/2, H*0.72);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, H*0.38);
  ctx.lineTo(W, H*0.38);
  ctx.stroke();

  // window frame border
  ctx.strokeStyle = 'rgba(242,239,232,0.04)';
  ctx.lineWidth = 18;
  ctx.strokeRect(0, 0, W, H*0.72);
}

function drawRain(W, H) {
  if (!state.raining) return;

  state.raindrops.forEach(d => {
    d.y += d.speed;
    d.x -= d.speed * 0.15;
    if (d.y > H*0.72) {
      d.y = -20;
      d.x = Math.random() * W;
    }

    ctx.strokeStyle = `rgba(160,185,220,${d.opacity * state.rainIntensity})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - d.len*0.15, d.y + d.len);
    ctx.stroke();
  });
}

function drawCondensation(W, H) {
  if (!state.raining) return;
  state.condensation.forEach(c => {
    ctx.fillStyle = `rgba(180,200,230,${c.opacity})`;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawDesk(W, H) {
  const dY = H * 0.72;

  // desk surface
  const deskGrad = ctx.createLinearGradient(0, dY, 0, dY + 8);
  deskGrad.addColorStop(0, 'rgba(232,200,154,0.18)');
  deskGrad.addColorStop(1, 'rgba(232,200,154,0.04)');
  ctx.fillStyle = deskGrad;
  ctx.fillRect(W*0.05, dY, W*0.9, 6);

  // lamp glow on desk
  const dGlow = ctx.createRadialGradient(W*0.78, dY, 0, W*0.78, dY, W*0.25);
  dGlow.addColorStop(0, `rgba(232,200,154,${0.12 * state.lampWarm})`);
  dGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = dGlow;
  ctx.fillRect(0, dY - 20, W, 40);

  // laptop
  if (state.sceneObjects.laptopOpen) {
    drawLaptop(W, H, dY);
  } else {
    // closed laptop
    ctx.fillStyle = 'rgba(30,25,20,0.9)';
    ctx.beginPath();
    ctx.roundRect(W*0.38, dY - 8, W*0.22, 8, 2);
    ctx.fill();
  }

  // coffee cup
  drawCoffee(W, H, dY, W*0.22, dY - 32);

  // second cup if event fired
  if (state.sceneObjects.secondCup) {
    drawCoffee(W, H, dY, W*0.28, dY - 28);
  }

  // candle
  if (state.sceneObjects.candle) {
    drawCandle(W, H, dY);
  }

  // books stack
  drawBooks(W, H, dY);

  // phone face down
  ctx.fillStyle = 'rgba(242,239,232,0.07)';
  ctx.beginPath();
  ctx.roundRect(W*0.65, dY - 18, W*0.06, W*0.035, 3);
  ctx.fill();

  // cork board (bg, left)
  ctx.fillStyle = 'rgba(100,65,30,0.12)';
  ctx.beginPath();
  ctx.roundRect(W*0.06, H*0.15, W*0.14, H*0.25, 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(242,239,232,0.04)';
  ctx.lineWidth = 1;
  ctx.strokeRect(W*0.06, H*0.15, W*0.14, H*0.25);

  // notes on cork board
  const notes = [
    {x:0.07, y:0.17, w:0.05, h:0.06, c:'rgba(232,200,154,0.12)'},
    {x:0.13, y:0.16, w:0.06, h:0.05, c:'rgba(255,255,255,0.05)'},
    {x:0.07, y:0.26, w:0.07, h:0.04, c:'rgba(77,159,255,0.1)'},
    {x:0.13, y:0.23, w:0.06, h:0.07, c:'rgba(255,77,109,0.08)'},
  ];
  notes.forEach(n => {
    ctx.fillStyle = n.c;
    ctx.fillRect(W*n.x, H*n.y, W*n.w, H*n.h);
  });
}

function drawLaptop(W, H, dY) {
  // screen
  ctx.fillStyle = 'rgba(8,12,20,0.95)';
  ctx.beginPath();
  ctx.roundRect(W*0.38, dY - H*0.22, W*0.24, H*0.2, 4);
  ctx.fill();

  // screen glow - blue
  const screenGlow = ctx.createRadialGradient(W*0.5, dY - H*0.12, 0, W*0.5, dY - H*0.12, W*0.15);
  const moodColor = state.characterMood === 'withdrawn' ? 'rgba(77,80,120,' : 'rgba(77,120,159,';
  screenGlow.addColorStop(0, moodColor + '0.12)');
  screenGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = screenGlow;
  ctx.fillRect(0, 0, W, H);

  // screen content lines
  ctx.fillStyle = 'rgba(242,239,232,0.12)';
  for (let i = 0; i < 4; i++) {
    const lw = (0.5 + Math.random() * 0.4) * W * 0.18;
    ctx.fillRect(W*0.41, dY - H*0.19 + i * H*0.04, lw, 2);
  }

  // hinge
  ctx.fillStyle = 'rgba(242,239,232,0.06)';
  ctx.fillRect(W*0.38, dY - 6, W*0.24, 6);
}

function drawCoffee(W, H, dY, cx, cy) {
  // cup body
  ctx.fillStyle = 'rgba(242,239,232,0.1)';
  ctx.beginPath();
  ctx.roundRect(cx, cy, 28*(W/1400), 22*(W/1400), 3);
  ctx.fill();

  // rim
  ctx.fillStyle = 'rgba(242,239,232,0.06)';
  ctx.beginPath();
  ctx.ellipse(cx + 14*(W/1400), cy, 14*(W/1400), 5*(W/1400), 0, 0, Math.PI*2);
  ctx.fill();

  // steam
  addSteam(cx + 12*(W/1400), cy - 5);
}

function drawCandle(W, H, dY) {
  const cx = W * 0.32, cy = dY - 30*(H/900);

  // candle body
  ctx.fillStyle = 'rgba(242,239,232,0.15)';
  ctx.fillRect(cx, cy, 10*(W/1400), 28*(H/900));

  // flame
  const flameFlicker = 0.7 + 0.3 * Math.sin(Date.now() * 0.01);
  ctx.fillStyle = `rgba(255,180,60,${0.8 * flameFlicker})`;
  ctx.beginPath();
  ctx.ellipse(cx + 5*(W/1400), cy - 8*(H/900), 4*(W/1400), 8*(H/900), 0, 0, Math.PI*2);
  ctx.fill();

  // candle glow
  const cGlow = ctx.createRadialGradient(cx + 5*(W/1400), cy, 0, cx + 5*(W/1400), cy, 80);
  cGlow.addColorStop(0, `rgba(255,160,60,${0.12 * flameFlicker})`);
  cGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = cGlow;
  ctx.fillRect(cx - 80, cy - 80, 170, 160);
}

function drawBooks(W, H, dY) {
  const bx = W*0.08;
  const books = [
    {h:12, w:72, c:'rgba(242,239,232,0.1)', r:-2},
    {h:11, w:66, c:'rgba(168,124,232,0.18)', r:1},
    {h:12, w:75, c:'rgba(232,200,154,0.14)', r:-1},
  ];

  let by = dY - 10;
  books.forEach(b => {
    ctx.save();
    ctx.translate(bx + b.w/2, by - b.h/2);
    ctx.rotate(b.r * Math.PI/180);
    ctx.fillStyle = b.c;
    ctx.fillRect(-b.w/2, -b.h/2, b.w*(W/1400), b.h*(H/900));
    ctx.restore();
    by -= b.h * (H/900) - 2;
  });
}

function drawPlant(W, H) {
  const px = W * 0.86, py = H * 0.6;

  // pot
  ctx.fillStyle = 'rgba(120,80,50,0.25)';
  ctx.beginPath();
  ctx.roundRect(px - 14*(W/1400), py, 28*(W/1400), 24*(H/900), 2);
  ctx.fill();

  // stems & leaves
  const t = Date.now() * 0.001;
  const stems = [
    {dx:-18, dy:-40, ddx:-28, ddy:-65},
    {dx:18,  dy:-38, ddx:30,  ddy:-62},
    {dx:0,   dy:-35, ddx:-5,  ddy:-70},
    {dx:-10, dy:-30, ddx:-30, ddy:-45},
    {dx:10,  dy:-32, ddx:35,  ddy:-48},
  ];

  stems.forEach((s, i) => {
    const sway = Math.sin(t * 0.3 + i * 0.8) * 2;
    ctx.strokeStyle = `rgba(80,120,50,${0.3 + i*0.05})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.quadraticCurveTo(px + s.dx + sway, py + s.dy, px + s.ddx + sway, py + s.ddy);
    ctx.stroke();
  });
}

function drawCharacter(W, H) {
  const cx = W * 0.5;
  const dY = H * 0.72;
  const breathe = Math.sin(Date.now() * 0.0015) * 1.5;

  if (state.sceneObjects.characterOnFloor) {
    // slumped on floor against the desk
    ctx.save();
    // body slumped
    ctx.fillStyle = 'rgba(200,185,165,0.55)';
    ctx.beginPath();
    ctx.ellipse(W*0.44, dY + H*0.09, W*0.07, H*0.05, -0.4, 0, Math.PI*2);
    ctx.fill();
    // legs
    ctx.strokeStyle = 'rgba(180,165,145,0.4)';
    ctx.lineWidth = W*0.022;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(W*0.44, dY + H*0.1);
    ctx.lineTo(W*0.56, dY + H*0.12);
    ctx.stroke();
    // head resting on knees
    ctx.fillStyle = 'rgba(210,175,140,0.7)';
    ctx.beginPath();
    ctx.ellipse(W*0.41, dY + H*0.04, W*0.022, H*0.032, -0.5, 0, Math.PI*2);
    ctx.fill();
    // hair
    ctx.fillStyle = 'rgba(60,40,25,0.8)';
    ctx.beginPath();
    ctx.ellipse(W*0.41, dY + H*0.02, W*0.025, H*0.028, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    return;
  }

  // ── SITTING CHARACTER ──
  ctx.save();

  // chair back (subtle)
  ctx.strokeStyle = 'rgba(180,160,120,0.12)';
  ctx.lineWidth = W*0.008;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - W*0.06, dY - H*0.02);
  ctx.lineTo(cx - W*0.06, dY - H*0.28);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + W*0.06, dY - H*0.02);
  ctx.lineTo(cx + W*0.06, dY - H*0.28);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx - W*0.06, dY - H*0.26);
  ctx.lineTo(cx + W*0.06, dY - H*0.26);
  ctx.stroke();

  // torso / upper body
  const skinTone = 'rgba(195,155,120,0.75)';
  const clothesTone = 'rgba(80,75,90,0.7)';

  // sweater / top
  ctx.fillStyle = clothesTone;
  ctx.beginPath();
  ctx.ellipse(cx, dY - H*0.1 + breathe*0.4, W*0.055, H*0.1, 0, 0, Math.PI*2);
  ctx.fill();

  // arms resting forward (toward desk)
  ctx.strokeStyle = 'rgba(80,75,90,0.65)';
  ctx.lineWidth = W*0.025;
  ctx.lineCap = 'round';
  // left arm
  ctx.beginPath();
  ctx.moveTo(cx - W*0.04, dY - H*0.1);
  ctx.quadraticCurveTo(cx - W*0.07, dY - H*0.06, cx - W*0.08, dY - H*0.02);
  ctx.stroke();
  // right arm
  ctx.beginPath();
  ctx.moveTo(cx + W*0.04, dY - H*0.1);
  ctx.quadraticCurveTo(cx + W*0.07, dY - H*0.06, cx + W*0.08, dY - H*0.02);
  ctx.stroke();

  // hands on desk
  ctx.fillStyle = skinTone;
  ctx.beginPath();
  ctx.ellipse(cx - W*0.075, dY - H*0.015, W*0.018, H*0.012, -0.2, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cx + W*0.075, dY - H*0.015, W*0.018, H*0.012, 0.2, 0, Math.PI*2);
  ctx.fill();

  // neck
  ctx.fillStyle = skinTone;
  ctx.beginPath();
  ctx.ellipse(cx, dY - H*0.2 + breathe*0.3, W*0.014, H*0.022, 0, 0, Math.PI*2);
  ctx.fill();

  // head
  ctx.fillStyle = skinTone;
  const headTilt = state.characterMood === 'withdrawn' ? 0.12 : 0;
  ctx.save();
  ctx.translate(cx, dY - H*0.245 + breathe*0.3);
  ctx.rotate(headTilt);
  ctx.beginPath();
  ctx.ellipse(0, 0, W*0.028, H*0.042, 0, 0, Math.PI*2);
  ctx.fill();

  // ear
  ctx.fillStyle = 'rgba(175,135,100,0.6)';
  ctx.beginPath();
  ctx.ellipse(W*0.028, H*0.005, W*0.006, H*0.01, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();

  // hair — dark, pulled back loosely
  ctx.fillStyle = 'rgba(35,22,12,0.92)';
  ctx.beginPath();
  ctx.ellipse(cx, dY - H*0.268 + breathe*0.3, W*0.032, H*0.03, 0, 0, Math.PI*2);
  ctx.fill();
  // hair falling to side
  ctx.beginPath();
  ctx.moveTo(cx + W*0.02, dY - H*0.255 + breathe*0.3);
  ctx.quadraticCurveTo(cx + W*0.04, dY - H*0.24, cx + W*0.03, dY - H*0.22);
  ctx.quadraticCurveTo(cx + W*0.035, dY - H*0.21, cx + W*0.025, dY - H*0.2);
  ctx.strokeStyle = 'rgba(35,22,12,0.5)';
  ctx.lineWidth = W*0.008;
  ctx.stroke();

  // laptop screen glow on face
  if (state.sceneObjects.laptopOpen) {
    const faceGlow = ctx.createRadialGradient(cx, dY - H*0.22, 0, cx, dY - H*0.22, W*0.1);
    faceGlow.addColorStop(0, 'rgba(77,130,180,0.25)');
    faceGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = faceGlow;
    ctx.fillRect(cx - W*0.1, dY - H*0.32, W*0.2, H*0.15);
  }

  ctx.restore();
}

function drawSteam(W, H) {
  state.steamParticles = state.steamParticles.filter(p => p.life > 0);
  state.steamParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
    p.vx += (Math.random() - 0.5) * 0.1;

    const r = Math.max(0.01, p.size * p.life);
    ctx.fillStyle = `rgba(242,239,232,${p.life * 0.12})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawNeonSign(W, H) {
  state.neonPhase += 0;
  const f = 0.8 + 0.2 * Math.sin(state.neonPhase * 7.3);
  const flicker = Math.random() > 0.995 ? 0.3 : f;

  ctx.save();
  ctx.globalAlpha = flicker * 0.5;
  ctx.font = `italic 300 ${W*0.028}px 'Cormorant Garamond'`;
  ctx.fillStyle = `rgba(255,77,109,0.8)`;
  ctx.shadowColor = '#ff4d6d';
  ctx.shadowBlur = 15;
  ctx.fillText('OPEN', W*0.74, H*0.54);
  ctx.restore();
}

// ── MAIN DRAW LOOP ──
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  drawSky(W, H);
  drawCity(W, H);
  drawNeonReflections(W, H);
  drawRain(W, H);
  drawCondensation(W, H);
  drawWindowFrame(W, H);
  drawRoom(W, H);
  drawPlant(W, H);
  drawLamp(W, H);
  drawDesk(W, H);
  drawCharacter(W, H);
  drawSteam(W, H);
  drawNeonSign(W, H);

  requestAnimationFrame(draw);
}

draw();

// ── WORLD TICK ──
const tickMessages = [
  {text:'she checks her phone. doesn\'t respond.', type:'normal'},
  {text:'types for 3 minutes. deletes it all.', type:'normal'},
  {text:'looks out the window. rain picks up.', type:'normal'},
  {text:'reaches for coffee. it\'s cold.', type:'normal'},
  {text:'opens a new tab. closes it immediately.', type:'normal'},
  {text:'someone texts. she reads it twice.', type:'event'},
  {text:'the neon outside flickers.', type:'normal'},
  {text:'she exhales. long. slow.', type:'normal'},
  {text:'starts typing again. faster this time.', type:'normal'},
  {text:'the building opposite — that light is still on.', type:'normal'},
  {text:'she pulls her knees up on the chair.', type:'normal'},
  {text:'a notification. ignored.', type:'normal'},
  {text:'the rain intensifies.', type:'normal'},
  {text:'she almost smiles at something on screen.', type:'event'},
  {text:'1:00am. the light across goes off.', type:'event'},
  {text:'she stands. stretches. sits back down.', type:'normal'},
  {text:'refills coffee.', type:'normal'},
  {text:'RELATIONSHIP_EVENT: message from riya', type:'event'},
  {text:'types. stops. types again. sends.', type:'normal'},
  {text:'the city goes a little quieter.', type:'normal'},
];

let tickIndex = 0;
const feedItems = [0,1,2,3,4].map(i => document.getElementById(`t${i}`));

function addTick(msg, type) {
  // shift items up
  for (let i = 0; i < feedItems.length - 1; i++) {
    feedItems[i].textContent = feedItems[i+1].textContent;
    feedItems[i].className = feedItems[i+1].className + ' dim';
  }
  const last = feedItems[feedItems.length-1];
  last.textContent = msg;
  last.className = `tick-item ${type} visible`;

  state.tickCount++;
  document.getElementById('tick-count').textContent = state.tickCount;

  setTimeout(() => {
    feedItems.forEach((f, i) => {
      if (i < feedItems.length - 1) {
        f.classList.add('dim');
        f.classList.remove('visible', 'event');
      }
    });
  }, 4000);
}

function worldTick() {
  const msg = tickMessages[tickIndex % tickMessages.length];
  addTick(msg.text, msg.type);

  // check for 1am light
  const mins = state.time % (24*60);
  if (mins >= 60 && mins < 80 && !state.oneAmLightOff) {
    state.oneAmLightOff = true;
    showToast('the light\ngoes off.', 'APT ACROSS · 1:00AM · ALWAYS');
    addTick('1:00am. the light across the street goes off. always.', 'event');
  }

  tickIndex++;
  state.time += 2;
  updateClock();
  updateMoodBar();
}

setInterval(worldTick, 5000);

// ── CLOCK ──
function updateClock() {
  const totalMins = state.time % (24*60);
  const h = Math.floor(totalMins / 60) % 24;
  const m = totalMins % 60;
  const h12 = h % 12 === 0 ? 12 : h % 12;
  const ampm = h < 12 ? 'am' : 'pm';
  document.getElementById('time-display').textContent = `${h12}:${m.toString().padStart(2,'0')}`;
}

function getNightness() {
  const h = Math.floor((state.time % (24*60)) / 60);
  return h >= 20 || h <= 5 ? 1.0 : 0.6;
}

// ── MOOD BAR ──
function updateMoodBar() {
  const bar = document.getElementById('mood-bar');
  // clear existing pips
  const existing = bar.querySelectorAll('.mood-pip');
  existing.forEach(p => p.remove());

  const moods = {focused:6, good:8, withdrawn:3, anxious:4};
  const level = moods[state.characterMood] || 5;

  for (let i = 10; i > 0; i--) {
    const pip = document.createElement('div');
    pip.className = 'mood-pip';
    if (i <= level) {
      if (state.characterMood === 'good') pip.classList.add('high');
      else if (state.characterMood === 'withdrawn' || state.characterMood === 'anxious') pip.classList.add('low');
      else pip.classList.add('active');
    }
    bar.appendChild(pip);
  }

  document.getElementById('mood-text').textContent = `MOOD: ${state.characterMood.toUpperCase()}`;
}

updateMoodBar();

// ── TOAST ──
function showToast(title, sub) {
  const toast = document.getElementById('event-toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-sub').textContent = sub;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

const simEvents = [
  {
    name:'second cup appears',
    sub:'RELATIONSHIP_EVENT · VISITOR INCOMING',
    action:() => {
      state.sceneObjects.secondCup = true;
      state.characterMood = 'anxious';
    }
  },
  {
    name:'she lights a candle.',
    sub:'MOOD_SHIFT · SOMETHING RESOLVED',
    action:() => {
      state.sceneObjects.candle = true;
      state.characterMood = 'good';
    }
  },
  {
    name:'laptop closes.',

    }

  {
    name:'she moves\nto the floor.',

    }
  },

      state.sceneObjects.laptopOpen = true;
      state.sceneObjects.characterOnFloor = false;
      state.characterMood = 'focused';
    }
  },
];

let eventIndex = 0;

function triggerEvent() {
  const evt = simEvents[eventIndex % simEvents.length];
  evt.action();
  showToast(evt.name, evt.sub);
  addTick(`SIM_EVENT: ${evt.sub.toLowerCase()}`, 'event');
  eventIndex++;
}

function cycleTime() {
  state.time += 60;
  if (state.time % (24*60) < 60) state.oneAmLightOff = false;
  updateClock();
}

function toggleRain() {
  state.raining = !state.raining;
  if (state.raining) initRain();
}

const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

function lerpColor(a, b, t) { return a; } // simplified — just return base

updateClock();
showToast('apt 4F,\n2nd ave.', 'MOOD42 · WORLD RUNNING · NYC');
