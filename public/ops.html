<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mood42 ops</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #222;
        }
        h1 {
            font-size: 18px;
            font-weight: 500;
            color: #888;
        }
        .status-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.healthy { background: #0d3320; color: #4ade80; }
        .status-badge.degraded { background: #3d2a08; color: #fbbf24; }
        .status-badge.broken { background: #3d0a0a; color: #f87171; }

        .summary {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 16px;
        }
        .stat-card .label { font-size: 11px; color: #666; text-transform: uppercase; }
        .stat-card .value { font-size: 28px; font-weight: 600; margin-top: 4px; }
        .stat-card .value.ok { color: #4ade80; }
        .stat-card .value.stale { color: #fbbf24; }
        .stat-card .value.broken { color: #f87171; }

        .channels-grid {
            display: grid;
            gap: 16px;
        }
        .channel-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
        }
        .channel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
        }
        .channel-name {
            font-size: 14px;
            font-weight: 600;
        }
        .agent-name {
            font-size: 12px;
            color: #666;
            margin-left: 8px;
        }
        .channel-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .channel-status.ok { background: #0d3320; color: #4ade80; }
        .channel-status.issues { background: #3d2a08; color: #fbbf24; }

        .regions-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #222;
        }
        .region-cell {
            background: #111;
            padding: 12px;
            min-height: 90px;
        }
        .region-cell.stale { background: #1a1a08; }
        .region-cell.broken { background: #1a0808; }

        .region-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .region-name {
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            font-weight: 600;
        }
        .region-time {
            font-size: 10px;
            color: #555;
        }
        .track-name {
            font-size: 12px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
            max-width: 100%;
            display: block;
            cursor: default;
        }
        .track-name:hover {
            overflow: visible;
            white-space: normal;
            word-break: break-word;
            position: relative;
            z-index: 10;
            background: #111;
        }
        .track-name.none { color: #f87171; font-style: italic; }
        .track-links {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }
        .track-links a {
            font-size: 9px;
            color: #4ade80;
            text-decoration: none;
            padding: 2px 6px;
            background: rgba(74, 222, 128, 0.1);
            border-radius: 3px;
        }
        .track-links a:hover {
            background: rgba(74, 222, 128, 0.2);
        }
        .track-links a.video {
            color: #60a5fa;
            background: rgba(96, 165, 250, 0.1);
        }
        .track-links a.video:hover {
            background: rgba(96, 165, 250, 0.2);
        }
        .track-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555;
        }
        .mood { color: #888; }
        .elapsed { color: #666; }
        .elapsed.stale { color: #fbbf24; }
        .elapsed.broken { color: #f87171; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .tab {
            padding: 8px 16px;
            background: #111;
            border: 1px solid #222;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .tab.active {
            background: #1a1a1a;
            color: #4ade80;
            border-color: #4ade80;
        }
        .tab:hover:not(.active) {
            background: #181818;
            color: #aaa;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Media DB */
        .media-section {
            margin-bottom: 32px;
        }
        .media-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .media-channel {
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .media-channel-header {
            padding: 12px 16px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .media-channel-name {
            font-weight: 600;
            font-size: 14px;
        }
        .media-counts {
            font-size: 11px;
            color: #666;
        }
        .media-list {
            padding: 12px 16px;
        }
        .media-type-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .media-item {
            font-size: 11px;
            color: #aaa;
            padding: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .media-item a {
            color: #4ade80;
            text-decoration: none;
            font-size: 10px;
        }
        .media-item a:hover { text-decoration: underline; }
        .media-item.duplicate {
            background: rgba(251, 191, 36, 0.1);
            padding: 4px 8px;
            margin: 0 -8px;
            border-radius: 4px;
        }
        .duplicate-badge {
            font-size: 9px;
            background: #3d2a08;
            color: #fbbf24;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 8px;
        }
        .added-date {
            font-size: 9px;
            color: #666;
            margin-left: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
        .status-dot.ok { background: #4ade80; }
        .status-dot.stale { background: #fbbf24; }
        .status-dot.broken { background: #f87171; }

        .refresh-info {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: #444;
        }
        .last-update { color: #666; }

        @media (max-width: 900px) {
            .summary { grid-template-columns: repeat(5, 1fr); }
            .regions-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .summary { grid-template-columns: repeat(3, 1fr); }
            .regions-grid { grid-template-columns: 1fr; }
            .stat-card .value { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>mood42 ops dashboard</h1>
        <div id="health-badge" class="status-badge">loading...</div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="streams">Live Streams</div>
        <div class="tab" data-tab="media">Media Database</div>
    </div>

    <div id="streams-tab" class="tab-content active">

    <div class="summary" id="summary">
        <div class="stat-card">
            <div class="label">Streams</div>
            <div class="value" id="total-streams">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Playing</div>
            <div class="value ok" id="ok-streams">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Stale</div>
            <div class="value stale" id="stale-streams">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Tick</div>
            <div class="value" id="tick">--</div>
        </div>
        <div class="stat-card">
            <div class="label">LLM</div>
            <div class="value" id="llm-status">--</div>
        </div>
    </div>

    <div class="channels-grid" id="channels-grid">
        <!-- Populated by JS -->
    </div>

    </div><!-- end streams-tab -->

    <div id="media-tab" class="tab-content">
        <div class="media-summary">
            <div class="stat-card">
                <div class="label">Total Tracks</div>
                <div class="value ok" id="total-tracks">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Videos</div>
                <div class="value" id="total-videos">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Unique Videos</div>
                <div class="value" id="unique-videos">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Duplicates</div>
                <div class="value stale" id="duplicate-count">--</div>
            </div>
        </div>

        <div id="media-channels">
            <!-- Populated by JS -->
        </div>
    </div>

    <div class="refresh-info">
        Auto-refresh every 5s | <span class="last-update" id="last-update">--</span>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function fetchOps() {
            try {
                const res = await fetch(`${API_BASE}/api/ops`);
                const data = await res.json();
                renderDashboard(data);
            } catch (err) {
                console.error('Failed to fetch ops data:', err);
                document.getElementById('health-badge').textContent = 'ERROR';
                document.getElementById('health-badge').className = 'status-badge broken';
            }
        }

        function renderDashboard(data) {
            // Health badge
            const healthBadge = document.getElementById('health-badge');
            const healthPct = data.summary.health_pct;
            if (healthPct >= 90) {
                healthBadge.textContent = `${healthPct}% healthy`;
                healthBadge.className = 'status-badge healthy';
            } else if (healthPct >= 50) {
                healthBadge.textContent = `${healthPct}% degraded`;
                healthBadge.className = 'status-badge degraded';
            } else {
                healthBadge.textContent = `${healthPct}% broken`;
                healthBadge.className = 'status-badge broken';
            }

            // Summary stats
            document.getElementById('total-streams').textContent = data.summary.total_streams;
            document.getElementById('ok-streams').textContent = data.summary.ok;
            document.getElementById('stale-streams').textContent = data.summary.stale + data.summary.broken;
            document.getElementById('tick').textContent = data.tick;

            // LLM status
            const llmEl = document.getElementById('llm-status');
            if (data.llm_enabled) {
                llmEl.textContent = 'ON';
                llmEl.className = 'value ok';
            } else {
                llmEl.textContent = 'OFF';
                llmEl.className = 'value stale';
            }

            // Channels grid
            const grid = document.getElementById('channels-grid');
            grid.innerHTML = data.channels.map(ch => `
                <div class="channel-card">
                    <div class="channel-header">
                        <div>
                            <span class="channel-name">${ch.id}</span>
                            <span class="agent-name">${ch.agent_name}</span>
                        </div>
                        <span class="channel-status ${ch.all_ok ? 'ok' : 'issues'}">
                            ${ch.all_ok ? 'ALL OK' : 'ISSUES'}
                        </span>
                    </div>
                    <div class="regions-grid">
                        ${Object.entries(ch.regions).map(([region, r]) => `
                            <div class="region-cell ${r.status}">
                                <div class="region-header">
                                    <span class="region-name">
                                        <span class="status-dot ${r.status}"></span>
                                        ${region}
                                    </span>
                                    <span class="region-time">${r.local_time || '--'}</span>
                                </div>
                                <div class="track-name ${r.track ? '' : 'none'}">
                                    ${r.track || 'NO TRACK'}
                                </div>
                                <div class="track-links">
                                    ${r.track_url ? `<a href="${r.track_url}" target="_blank">▶ audio</a>` : ''}
                                    ${r.video_url ? `<a href="${r.video_url}" target="_blank" class="video">▶ video</a>` : ''}
                                </div>
                                <div class="track-meta">
                                    <span class="mood">${r.mood || '--'}</span>
                                    <span class="elapsed ${r.status}">
                                        ${r.elapsed_min}m${r.status === 'stale' ? ' STALE' : ''}
                                    </span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Last update
            document.getElementById('last-update').textContent =
                `Last update: ${new Date().toLocaleTimeString()}`;
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tab.dataset.tab}-tab`).classList.add('active');

                // Fetch media data when switching to media tab
                if (tab.dataset.tab === 'media') {
                    fetchMedia();
                }
            });
        });

        // Fetch media database
        async function fetchMedia() {
            try {
                const res = await fetch(`${API_BASE}/api/ops/media`);
                const data = await res.json();
                renderMedia(data);
            } catch (err) {
                console.error('Failed to fetch media data:', err);
            }
        }

        function renderMedia(data) {
            // Summary stats
            document.getElementById('total-tracks').textContent = data.summary.total_tracks;
            document.getElementById('total-videos').textContent = data.summary.total_videos;
            document.getElementById('unique-videos').textContent = data.summary.unique_video_urls;
            document.getElementById('duplicate-count').textContent = data.summary.duplicate_videos.length;

            // Build duplicate lookup
            const duplicateUrls = {};
            data.summary.duplicate_videos.forEach(d => {
                duplicateUrls[d.url] = d.channels;
            });

            // Render channels
            const container = document.getElementById('media-channels');
            const channelIds = Object.keys(data.channels).sort();

            container.innerHTML = channelIds.map(chId => {
                const ch = data.channels[chId];
                return `
                    <div class="media-channel">
                        <div class="media-channel-header">
                            <span class="media-channel-name">${chId.toUpperCase()}</span>
                            <span class="media-counts">${ch.track_count} tracks, ${ch.video_count} videos</span>
                        </div>
                        <div class="media-list">
                            <div class="media-type-label">Audio Tracks</div>
                            ${ch.tracks.map(t => `
                                <div class="media-item">
                                    <span>${t.name}</span>
                                    <a href="${t.url}" target="_blank">▶ play</a>
                                </div>
                            `).join('')}

                            <div class="media-type-label" style="margin-top: 12px;">Videos</div>
                            ${ch.videos.map(v => {
                                const isDup = duplicateUrls[v.url];
                                const dupChannels = isDup ? isDup.filter(c => c !== chId) : [];
                                const addedDate = v.added_at ? new Date(v.added_at * 1000).toLocaleDateString() : '';
                                return `
                                    <div class="media-item ${isDup ? 'duplicate' : ''}">
                                        <span>
                                            ${v.name}
                                            ${addedDate ? `<span class="added-date">added ${addedDate}</span>` : ''}
                                            ${isDup ? `<span class="duplicate-badge">also in ${dupChannels.join(', ')}</span>` : ''}
                                        </span>
                                        <a href="${v.url}" target="_blank">▶ play</a>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Initial fetch
        fetchOps();

        // Auto-refresh every 5 seconds
        setInterval(fetchOps, 5000);
    </script>
</body>
</html>
