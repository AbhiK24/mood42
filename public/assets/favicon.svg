<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- TV frame -->
  <rect x="4" y="12" width="40" height="30" rx="4" ry="4" fill="none" stroke="url(#g)" stroke-width="3"/>

  <!-- Signal wave -->
  <path d="M12 27 Q18 18, 24 27 Q30 36, 36 27" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Antennas -->
  <line x1="16" y1="12" x2="10" y2="4" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="12" x2="38" y2="4" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
