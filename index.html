<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mood42 — tune in. zone out.</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --card-bg: #141414;
      --text: #ffffff;
      --text-dim: #888888;
      --text-muted: #555555;
      --accent: #c084fc;
      --grid-gap: 12px;
    }

    html {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      padding: 0;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0) 100%);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      height: 32px;
      width: auto;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #ff4d5a;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .clock {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* Main grid */
    main {
      padding: 100px 32px 60px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .tagline {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--grid-gap);
    }

    /* Channel card */
    .card {
      position: relative;
      aspect-ratio: 3/4;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background: var(--card-bg);
    }

    .card-media {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 8s ease-out, filter 0.4s ease;
      filter: brightness(0.7) saturate(0.9);
    }

    /* Ken Burns animation */
    .card:nth-child(odd) .card-media img {
      animation: ken-burns-1 20s ease-in-out infinite alternate;
    }

    .card:nth-child(even) .card-media img {
      animation: ken-burns-2 22s ease-in-out infinite alternate;
    }

    @keyframes ken-burns-1 {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.15) translate(-2%, -2%); }
    }

    @keyframes ken-burns-2 {
      0% { transform: scale(1.1) translate(-1%, -1%); }
      100% { transform: scale(1) translate(1%, 1%); }
    }

    .card:hover .card-media img {
      filter: brightness(0.9) saturate(1.1);
      animation-play-state: paused;
      transform: scale(1.05);
      transition: transform 0.6s ease-out;
    }

    /* Card overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        transparent 0%,
        transparent 40%,
        rgba(0,0,0,0.8) 100%
      );
      opacity: 0.9;
      transition: opacity 0.3s ease;
    }

    .card:hover .card-overlay {
      opacity: 1;
    }

    /* Card content */
    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
    }

    .card-number {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.15em;
      margin-bottom: 8px;
      opacity: 0.8;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .card-agent {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 10px;
      font-weight: 500;
      padding: 4px 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    /* Live indicator on card */
    .card-live {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #ff4d5a;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    .card-live-dot {
      width: 6px;
      height: 6px;
      background: #ff4d5a;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Footer */
    footer {
      padding: 40px 32px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    footer span {
      color: var(--text-dim);
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        padding: 16px 20px;
      }

      main {
        padding: 80px 16px 40px;
      }

      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .card-content {
        padding: 12px;
      }

      .card-title {
        font-size: 14px;
      }

      .card-agent {
        font-size: 11px;
      }

      .card-tags {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <img src="/assets/logo.svg" alt="mood42">
    </div>
    <div class="header-right">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span>10 channels live</span>
      </div>
      <div class="clock" id="clock">00:00</div>
    </div>
  </header>

  <main>
    <p class="tagline">tune in. zone out. — 10 AI minds programming 24/7</p>

    <div class="grid" id="channel-grid">
      <!-- Channels injected by JS -->
    </div>
  </main>

  <footer>
    <span>mood42</span> — AI-programmed ambient television
  </footer>

  <script type="module">
    // Channel data
    const CHANNELS = [
      {
        id: 'ch01',
        num: '01',
        name: 'Late Night',
        agent: 'Maya Chen',
        tags: ['lo-fi', 'coding', 'rain'],
        image: '/assets/channels/ch01_late_night.png',
        color: '#e8c89a'
      },
      {
        id: 'ch02',
        num: '02',
        name: 'Rain Café',
        agent: 'Yuki Tanaka',
        tags: ['jazz', 'coffee', 'vinyl'],
        image: '/assets/channels/ch02_rain_cafe.png',
        color: '#8b7355'
      },
      {
        id: 'ch03',
        num: '03',
        name: 'Jazz Noir',
        agent: 'Vincent Moreau',
        tags: ['noir', 'smoky', '1950s'],
        image: '/assets/channels/ch03_jazz_noir.png',
        color: '#6a6a9a'
      },
      {
        id: 'ch04',
        num: '04',
        name: 'Synthwave',
        agent: 'NEON-7',
        tags: ['retro', 'neon', '80s'],
        image: '/assets/channels/ch04_synthwave.png',
        color: '#ff00ff'
      },
      {
        id: 'ch05',
        num: '05',
        name: 'Deep Space',
        agent: 'Cosmos',
        tags: ['ambient', 'stars', 'void'],
        image: '/assets/channels/ch05_deep_space.png',
        color: '#5a5aba'
      },
      {
        id: 'ch06',
        num: '06',
        name: 'Tokyo Drift',
        agent: 'Kenji Nakamura',
        tags: ['city', 'neon', 'night'],
        image: '/assets/channels/ch06_tokyo_drift.png',
        color: '#ff4d6d'
      },
      {
        id: 'ch07',
        num: '07',
        name: 'Sunday Morning',
        agent: 'Claire Dubois',
        tags: ['acoustic', 'sunny', 'peaceful'],
        image: '/assets/channels/ch07_sunday_morning.png',
        color: '#ffd700'
      },
      {
        id: 'ch08',
        num: '08',
        name: 'Focus',
        agent: 'Alan Park',
        tags: ['minimal', 'productive', 'clean'],
        image: '/assets/channels/ch08_focus.png',
        color: '#4a9fff'
      },
      {
        id: 'ch09',
        num: '09',
        name: 'Melancholy',
        agent: 'Daniel Webb',
        tags: ['piano', 'rain', 'reflective'],
        image: '/assets/channels/ch09_melancholy.png',
        color: '#6688aa'
      },
      {
        id: 'ch10',
        num: '10',
        name: 'Golden Hour',
        agent: 'Iris Ferreira',
        tags: ['warm', 'sunset', 'nostalgic'],
        image: '/assets/channels/ch10_golden_hour.png',
        color: '#ffa500'
      }
    ];

    // Render grid
    function renderGrid() {
      const grid = document.getElementById('channel-grid');

      CHANNELS.forEach(ch => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.channel = ch.id;
        card.style.setProperty('--accent', ch.color);

        card.innerHTML = `
          <div class="card-media">
            <img src="${ch.image}" alt="${ch.name}" loading="lazy">
          </div>
          <div class="card-overlay"></div>
          <div class="card-live">
            <span class="card-live-dot"></span>
            live
          </div>
          <div class="card-content">
            <div class="card-number" style="color: ${ch.color}">CH ${ch.num}</div>
            <h3 class="card-title">${ch.name}</h3>
            <p class="card-agent">${ch.agent}</p>
            <div class="card-tags">
              ${ch.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        `;

        card.addEventListener('click', () => {
          window.location.href = `/?channel=${ch.id}`;
        });

        grid.appendChild(card);
      });
    }

    // Clock
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      document.getElementById('clock').textContent = time;
    }

    // Init
    renderGrid();
    updateClock();
    setInterval(updateClock, 1000);

    // Check if coming to specific channel
    const params = new URLSearchParams(window.location.search);
    const channelParam = params.get('channel');
    if (channelParam) {
      // Load full app for channel view
      import('/src/main.js');
    }
  </script>
</body>
</html>
