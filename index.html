<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mood42 — apt 4F, 2nd ave</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #080810;
      --warm: #e8c89a;
      --neon-r: #ff4d6d;
      --neon-b: #4d9fff;
      --neon-g: #39ff8a;
      --dim: #404055;
      --paper: #f2efe8;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--ink);
      overflow: hidden;
      font-family: 'Cormorant Garamond', serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #app canvas {
      display: block;
    }

    /* grain overlay */
    .grain-overlay {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9998;
    }

    /* HUD: clock + status */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 2rem 2.5rem;
      z-index: 100;
      pointer-events: none;
    }

    #clock {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(242, 239, 232, 0.25);
      letter-spacing: 0.2em;
      line-height: 1.8;
    }

    #clock .time-big {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.8rem;
      font-weight: 300;
      color: rgba(242, 239, 232, 0.15);
      display: block;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    #status {
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: rgba(242, 239, 232, 0.15);
      letter-spacing: 0.15em;
      line-height: 2;
    }

    .status-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--neon-g);
      margin-right: 6px;
      animation: pulse-dot 2s ease infinite;
      vertical-align: middle;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* tick feed */
    #tick-feed {
      position: fixed;
      bottom: 2rem;
      left: 2.5rem;
      z-index: 100;
      pointer-events: none;
      max-width: 320px;
    }

    .tick-item {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: rgba(242, 239, 232, 0);
      letter-spacing: 0.08em;
      line-height: 1.7;
      padding: 0.5rem 0;
      border-left: 2px solid transparent;
      padding-left: 1rem;
      margin-bottom: 0.3rem;
      transition: all 0.8s ease;
      transform: translateY(6px);
    }

    .tick-item.visible {
      color: rgba(242, 239, 232, 0.35);
      transform: translateY(0);
    }

    .tick-item.event {
      border-left-color: var(--neon-r);
      color: rgba(255, 77, 109, 0.7) !important;
    }

    .tick-item.dim {
      color: rgba(242, 239, 232, 0.08) !important;
      border-left-color: transparent;
    }

    /* event toast */
    #event-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.96);
      z-index: 200;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    #event-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #event-toast .event-title {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      color: rgba(242, 239, 232, 0.9);
      line-height: 1.2;
      text-shadow: 0 0 60px rgba(232, 200, 154, 0.3);
      white-space: pre-line;
    }

    #event-toast .event-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: rgba(242, 239, 232, 0.3);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 0.8rem;
    }

    /* mood bar */
    #mood-bar {
      position: fixed;
      right: 2.5rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      pointer-events: none;
    }

    #mood-bar .mood-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      color: rgba(242, 239, 232, 0.12);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      margin-bottom: 0.5rem;
    }

    .mood-pip {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(242, 239, 232, 0.08);
      transition: all 1s ease;
    }

    .mood-pip.active { background: var(--warm); box-shadow: 0 0 8px var(--warm); }
    .mood-pip.low { background: var(--neon-r); box-shadow: 0 0 8px rgba(255, 77, 109, 0.5); }
    .mood-pip.high { background: var(--neon-g); box-shadow: 0 0 8px rgba(57, 255, 138, 0.5); }

    /* keyboard hints */
    #controls-hint {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      z-index: 100;
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      color: rgba(242, 239, 232, 0.1);
      letter-spacing: 0.1em;
      text-align: right;
      line-height: 1.8;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="grain-overlay"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="clock">
      <span class="time-big" id="time-display">11:47</span>
      <span id="date-display">tue, march 24</span><br>
      <span id="weather-display">raining · 48°f · nyc</span>
    </div>
    <div id="status">
      <span class="status-dot"></span>WORLD RUNNING<br>
      SIM TICK #<span id="tick-count">0</span><br>
      APT 4F · 2ND AVE<br>
      <span id="mood-text">MOOD: FOCUSED</span>
    </div>
  </div>

  <!-- tick feed -->
  <div id="tick-feed">
    <div class="tick-item" id="t0"></div>
    <div class="tick-item" id="t1"></div>
    <div class="tick-item" id="t2"></div>
    <div class="tick-item" id="t3"></div>
    <div class="tick-item" id="t4"></div>
  </div>

  <!-- event toast -->
  <div id="event-toast">
    <div class="event-title" id="toast-title"></div>
    <div class="event-sub" id="toast-sub"></div>
  </div>

  <!-- mood bar -->
  <div id="mood-bar">
    <div class="mood-label">mood</div>
  </div>

  <!-- keyboard hints -->
  <div id="controls-hint">
    E — event · T — time<br>
    R — rain · M — mood<br>
    SPACE — pause
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
