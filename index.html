<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mood42 — tune in. zone out.</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0c;
      --bg-elevated: #111114;
      --text: #e8e8ec;
      --text-dim: #5a5a66;
      --text-muted: #3a3a44;
      --accent-warm: #e8c89a;
      --accent-red: #ff4d5a;
      --accent-pink: #ff6b9d;
      --accent-purple: #c084fc;
      --accent-blue: #60a5fa;
      --accent-cyan: #22d3ee;
      --accent-green: #4ade80;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      color: var(--text);
      cursor: grab;
    }

    body:active {
      cursor: grabbing;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #app canvas {
      display: block;
    }

    /* CRT Scanline overlay */
    .crt-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9997;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 2px
      );
      animation: scanline-flicker 0.1s infinite;
    }

    @keyframes scanline-flicker {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.35; }
    }

    /* Vignette */
    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9996;
      background: radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(0,0,0,0.4) 100%);
    }

    /* Film grain */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: grain-shift 0.5s steps(1) infinite;
    }

    @keyframes grain-shift {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-1px, 1px); }
      50% { transform: translate(1px, -1px); }
      75% { transform: translate(-1px, -1px); }
    }

    /* Header */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 2rem 3rem;
      z-index: 100;
      pointer-events: none;
    }

    #logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--accent-warm) 0%, var(--accent-pink) 50%, var(--accent-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #tagline {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.3em;
      margin-top: 0.5rem;
      text-transform: uppercase;
    }

    #clock-section {
      text-align: right;
    }

    #clock {
      font-family: 'Space Mono', monospace;
      font-size: 2.5rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
      opacity: 0.2;
    }

    #time-period {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    #live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: var(--accent-red);
      letter-spacing: 0.2em;
      margin-top: 0.8rem;
    }

    #live-indicator .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-red);
      animation: pulse-live 1.5s ease-in-out infinite;
    }

    @keyframes pulse-live {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* Footer */
    #footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 2rem 3rem;
      z-index: 100;
      pointer-events: none;
    }

    #footer-left {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      line-height: 2;
    }

    #footer-right {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-align: right;
      line-height: 2;
    }

    #channel-count {
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    /* Event toast */
    #event-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      z-index: 200;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #event-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    #event-toast .toast-title {
      font-family: 'Inter', sans-serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.1em;
    }

    #event-toast .toast-sub {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 0.8rem;
    }

    /* Drag hint */
    #drag-hint {
      position: fixed;
      bottom: 50%;
      left: 50%;
      transform: translate(-50%, 50%);
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
      z-index: 50;
      pointer-events: none;
      animation: fade-hint 3s ease-in-out infinite;
    }

    @keyframes fade-hint {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }

    /* Keyboard shortcuts (hidden by default) */
    .kbd {
      display: inline-block;
      padding: 0.15rem 0.4rem;
      background: var(--bg-elevated);
      border: 1px solid var(--text-muted);
      border-radius: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 0.5rem;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- Effects -->
  <div class="crt-overlay"></div>
  <div class="vignette"></div>
  <div class="grain"></div>

  <!-- Header -->
  <div id="header">
    <div id="brand">
      <div id="logo">mood42</div>
      <div id="tagline">tune in · zone out</div>
    </div>
    <div id="clock-section">
      <div id="clock">00:00</div>
      <div id="time-period">loading</div>
      <div id="live-indicator">
        <span class="dot"></span>
        <span>10 CHANNELS LIVE</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer">
    <div id="footer-left">
      <span id="channel-count">10 CHANNELS</span><br>
      10 MINDS · ALWAYS ON<br>
      ← DRAG TO EXPLORE →
    </div>
    <div id="footer-right">
      <span class="kbd">1-0</span> TUNE IN ·
      <span class="kbd">M</span> MUSIC ·
      <span class="kbd">ESC</span> BACK
    </div>
  </div>

  <!-- Event toast -->
  <div id="event-toast">
    <div class="toast-title" id="toast-title"></div>
    <div class="toast-sub" id="toast-sub"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
