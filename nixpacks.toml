# mood42 build configuration for Railway
# Uses Node.js 22 for Vite 8 and Python 3.11 for FastAPI

[phases.setup]
nixPkgs = ["nodejs_22", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
    "npm install",
    "pip install -r server/requirements.txt"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "cd server && uvicorn main:app --host 0.0.0.0 --port ${PORT:-3000}"
